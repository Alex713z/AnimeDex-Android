<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimeDex Mobile</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>AnimeDex</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Buscar anime...">
                <button id="searchBtn">Buscar</button>
            </div>
            <div class="plugin-selector">
                <label for="pluginSelect">Fuente:</label>
                <select id="pluginSelect">
                    <!-- Los plugins se cargarán aquí -->
                </select>
            </div>
        </header>

        <main id="resultsContainer">
            <!-- Los resultados de la búsqueda aparecerán aquí -->
        </main>

        <div id="playerContainer" class="hidden">
            <button id="closePlayerBtn">Cerrar Reproductor</button>
            <video id="videoPlayer" controls></video>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
